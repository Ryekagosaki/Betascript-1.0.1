<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetaScript Web IDE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #header {
            background: #252526;
            padding: 10px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #header h1 {
            font-size: 16px;
            font-weight: 400;
        }
        #header .actions button {
            background: #0e6398;
            border: none;
            color: white;
            padding: 6px 12px;
            margin-left: 10px;
            cursor: pointer;
            border-radius: 2px;
        }
        #header .actions button:hover {
            background: #1177bb;
        }
        #editor-container {
            flex: 1;
            display: flex;
        }
        #editor {
            flex: 1;
        }
        #output {
            width: 400px;
            background: #1e1e1e;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        #output-header {
            background: #252526;
            padding: 8px 12px;
            font-size: 12px;
            border-bottom: 1px solid #333;
        }
        #output-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
        }
        #output-content .error {
            color: #f48771;
        }
        #output-content .success {
            color: #89d185;
        }
        #output-content .log {
            color: #d4d4d4;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <h1>BetaScript Web IDE</h1>
            <div class="actions">
                <button id="run-btn">Run (Ctrl+Enter)</button>
                <button id="clear-btn">Clear Output</button>
            </div>
        </div>
        <div id="editor-container">
            <div id="editor"></div>
            <div id="output">
                <div id="output-header">Output</div>
                <div id="output-content"></div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="app.js"></script>
</body>
</html>
