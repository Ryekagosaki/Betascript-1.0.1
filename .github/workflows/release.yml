name: BetaScript CI/CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  release-npm:
    name: Publish to npm
    needs: quality
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  binaries:
    name: Build Standalone Binaries
    needs: quality
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Install pkg
        run: npm install -g pkg
      - name: Build binary for Linux x64
        run: pkg . --targets node20-linux-x64 --output dist/betascript-linux-x64
      - name: Build binary for macOS arm64
        run: pkg . --targets node20-macos-arm64 --output dist/betascript-macos-arm64
      - name: Build binary for Windows x64
        run: pkg . --targets node20-win-x64 --output dist/betascript-win-x64.exe
      - name: Upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/betascript-linux-x64
            dist/betascript-macos-arm64
            dist/betascript-win-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    name: Deploy Documentation
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Build docs
        run: |
          mkdir -p docs
          cp -r examples docs/examples
          cp README.md docs/index.md || echo "# BetaScript" > docs/index.md
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
